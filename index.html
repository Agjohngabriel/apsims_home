      "applicationCategory": "BusinessApplication",
      "operatingSystem": "WhatsApp, Telegram, Web",
      "offers": [
        { "@type": "Offer", "name": "Free", "price": "0", "priceCurrency": "NGN" },
        { "@type": "Offer", "name": "Basic", "price": "1500", "priceCurrency": "NGN", "billingDuration": "P1M" },

        "@type": "Organization",

        "@type": "AggregateRating",
        "ratingValue": "4.8",

    <!-- Structured Data: FAQ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Do I need to download anything to use APSIMS?",
          "acceptedAnswer": { "@type": "Answer", "text": "No. APSIMS lives entirely inside WhatsApp and Telegram. Save the number, send /start, and you're in. No app store, no installation, nothing to learn." }
        },
        {
          "@type": "Question",
          "name": "How does APSIMS understand my messages?",
          "acceptedAnswer": { "@type": "Answer", "text": "APSIMS is tuned for inventory and sales language — naira amounts, local units like bags, crates, and tins, and Nigerian business vocabulary. It echoes back what it understood so you can correct mistakes immediately." }
        },
        {
          "@type": "Question",
          "name": "What if I lose my phone?",
          "acceptedAnswer": { "@type": "Answer", "text": "Your data is safe. Everything lives in APSIMS's encrypted database, keyed to your phone number — not on your phone. Get a new SIM with the same number, reinstall WhatsApp, and message the bot. You're back in seconds." }
        },
        {
          "@type": "Question",
          "name": "How much does APSIMS cost?",
          "acceptedAnswer": { "@type": "Answer", "text": "Free to start — up to 50 entries per month. Basic at ₦1,500/month gets unlimited entries and monthly PDF reports. Pro at ₦3,500/month adds credit tracking, smart insights, and the web portal." }
        }
      ]
    }
    </script>
